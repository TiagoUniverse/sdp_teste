# This is a Databricks asset bundle definition for sdp_teste.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: sdp_teste
  uuid: 392ed6fb-62cd-4ff1-97ff-377290ae40f2

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-741e4be9-a51c.cloud.databricks.com
    variables:
      catalog: ecommerce
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-741e4be9-a51c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/tiagocesar68@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/tiagocesar68@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ecommerce
      schema: prod
    permissions:
      - user_name: tiagocesar68@gmail.com
        level: CAN_MANAGE
